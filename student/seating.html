<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Seating — Examination Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="logo-box"><i class="fas fa-graduation-cap"></i></div>
    <div>
      <h2>Examination</h2>
      <span>College ERP System</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-nav-label">Examination Module</div>
    <div class="nav-section">
      <button class="nav-section-header" onclick="toggleSection(this.parentElement)"><i class="fas fa-th-large"></i><span>Dashboard</span><i class="fas fa-chevron-right arrow"></i></button>
      <div class="nav-sub"><a href="../index.html"><i class="fas fa-circle" style="font-size:6px"></i><span>Overview</span></a></div>
    </div>

    <div class="nav-section open">
      <button class="nav-section-header" onclick="toggleSection(this.parentElement)"><i class="fas fa-user-graduate"></i><span>Student</span><i class="fas fa-chevron-right arrow"></i></button>
      <div class="nav-sub">
        <a href="seating.html" class="active"><i class="fas fa-circle" style="font-size:6px"></i><span>My Seating</span></a>
        <!-- Hall Ticket / My Result / Apply Revaluation are interactive pages
             that only exist inside the main SPA (index.html, Student role) —
             this standalone portal only covers My Seating, so these link
             back to the SPA rather than to a non-existent standalone page. -->
        <a href="../index.html"><i class="fas fa-circle" style="font-size:6px"></i><span>My Hall Ticket</span></a>
        <a href="../index.html"><i class="fas fa-circle" style="font-size:6px"></i><span>My Result</span></a>
        <a href="../index.html"><i class="fas fa-circle" style="font-size:6px"></i><span>Apply Revaluation</span></a>
      </div>
    </div>
  </nav>
  <div class="sidebar-footer" style="flex-wrap:wrap;gap:8px">
    <div style="display:flex;align-items:center;gap:8px;width:100%">
      <div class="avatar">S</div>
      <div style="min-width:0">
        <div style="color:var(--text);font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Aarav Sharma</div>
        <div style="font-size:11px">student</div>
      </div>
      <a href="../index.html" class="btn btn-sm" style="margin-left:auto;padding:4px 8px;font-size:10px;flex-shrink:0" title="Back to main app"><i class="fas fa-arrow-left"></i></a>
    </div>
  </div>
</aside>

<!-- MAIN CONTENT -->
<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1><i class="fas fa-chair"></i> My Seating</h1>
      <div class="breadcrumb">Examination / Student / <span>My Seating</span></div>
    </div>
    <div class="topbar-right">
      <span class="mode-badge" id="modeBadge"><i class="fas fa-university"></i> Autonomous Mode</span>
    </div>
  </header>

  <div class="content" id="pageContent">
    <!-- Content injected by JS -->
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="closeModal()">Save</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/core.js"></script>
<script src="../js/post-exam.js"></script>
<script>
  function renderCurrentPage() {
    document.getElementById('pageContent').innerHTML = renderStudentSeating();
    updateModeBadge();
  }
  renderCurrentPage();
</script>
</body>
</html>
